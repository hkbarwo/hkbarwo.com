zh:
  content: >-
    **「香港藝術發展局」的網站（簡稱「本網站」）是由香港藝術發展局（簡稱「藝發局」或「我們」）開發及管理。**


    以下條款及條件（簡稱「使用條款」）適用於閣下對本網站的使用及限制閣下進入及使用本網站的所有方面，本網站的用戶（簡稱「閣下」或「用戶」）應細心詳閱。如閣下不接受全部使用條款，閣下應立刻停止使用本網站。

    藝發局可按其絕對酌情決定權不時修改本使用條款而無須預先通知或對閣下承擔任何法律責任。閣下在本使用條款作出有關修改後仍繼續使用本網站，即代表閣下無條件同意受該等修改的約束。

    免責聲明


    1. 閣下確認並同意，倘若閣下決定瀏覽或使用藝發局提供的服務，閣下須自行承擔一切風險。藝發局對於任何因瀏覽或使用本網站而造成或與此有關或在其他方面與此有關聯的任何損失或損害概不承擔責任。

    2. 藝發局所提供或編製的資訊及內容是基於香港特別行政區法律並受其管轄，即該等資訊及內容未必適合其他司法管轄區的需要及規範或其實際情況。
         本網站載列的資訊是由藝發局編製，只供一般參考之用。本網站所載列有關藝術工作者及術團體的藝術活動、消息及職位空缺的資訊均由該等第三方人士及團體向藝發局提供。藝發局力求確保載列於本網站的資訊準確，但對於該等資訊在任何特定情況下使用時的準確性、充足性或恰當性，並沒有作出任何明示或隱含的聲明、陳述、保證或擔保。對於任何尚未更新的該等資訊，藝發局亦不會負責。
    3. 藝發局保留權利，可隨時運用其絕對酌情決定權省略、暫停、增加、刪除或編輯本網站所載的資訊包括其展示方式或功能，而無須給予任何理由或事先通知。用戶有責任自行評估藝發局網站所載的一切資訊，並宜在依據該等資訊行事前對該等資訊加以核實或徵詢獨立意見。

    4. 藝發局並不保證本網站載列的資訊不存在缺陷、錯誤、遺漏、病毒或任何可能改變、清除、增加或破壞閣下的軟件、資料或設備的事宜，或經互聯網發送的信息不受攔截、損毀或遺失，或者用戶可以或可不間斷的進入本網站，或對此承擔任何責任。為免引起疑問，不論是否經使用藝發局提供的服務下載或以其它方式取得任何資料之行為，均由閣下自行承擔風險並酌情決定。因下載任何資訊而導致閣下的電腦系統有任何損壞或資料有損壞或流失，純屬閣下的責任。

    5. 本網站的連結可能會帶閣下到其他網站，閣下知悉及同意藝發局不會對任何該等連結到的網站所提供的任何内容或資訊的準確性或可用性承擔責任。其他網站的連結並不構成藝發局對此等網站或其提供的任何資訊、產品、廣告或其他資料的認可。
       閣下明確知悉並同意，藝發局不會承擔任何直接、間接、附帶、特別、衍生性、警戒性或懲罰性因以下原因而造成的損害賠償，包括但不限於損失或利潤、商譽、使用、資料或其他無形損失的損害賠償，（即使藝發局可能已被告知其可能性）：
