    香港八和會館在本網址所提供的資料只供參考之用。香港八和會館會盡力確保這個網址上的資料準確無誤，但香港八和會館並不對本網址所提供的資料的準確性作出任何明示或隱含的保證。


    本網址亦載有由其他各方輸入的資料，使用者亦可透過將本網址連接到其他網址而取得由其他各方所提供的資料（統稱〝其他資料〞）。香港八和會館明確聲明並沒有批准或認可本網址所載的其他資料或與本網址有關連的其他資料。


    對於與本網址有關連的任何因由所引致的任何損失或損害，香港八和會館概不負責。香港八和會館有絕對酌情權隨時刪除、暫時停載或編輯本網址上的各項資料而無須給予任何理由。使用者須負責自行評估本網址所載的各項資料或與本網址有關連的各項資料，並應在根據該等資料行事前，藉參照原本發布的文本以核實該等資料，以及徵詢獨立意見。
