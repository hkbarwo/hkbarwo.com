en:
  heading: Support Us
  title: Your support can surely contribute to the development and inheritance of Cantonese opera.
  description: Your generous donation will benefit the promotion of Cantonese opera by the Chinese Artist Association of Hong Kong (CAAHK) and bring about positive changes to the long-term development of Cantonese opera in Hong Kong. Please act now and donate to CAAHK!
