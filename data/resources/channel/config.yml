zh:
  title: 八和頻道
  description: 為了向更多世界不同地區的觀眾，推廣粵劇藝術和文化，八和會館在香港特區政府民政事務局的支持下，在2020年製作了《八和頻道：粵劇網上學堂》，共40集粵劇導賞教材。通用無遠弗屆的互聯網，不同地區的觀眾可隨時免費選看40集深入淺出的粵劇導賞節目。在監製汪明荃的帶領下，由製作小組七位成員
    (羅家英、龍貫天、新劍郎、王超群、陳鴻進、溫玉瑜、黎耀威)
    負責構思、規劃整體的節目內容，再由多位藝術總監分別負責每集節目的選材、選角和示範內容。40集節目內容多樣化，每集專題介紹唱、做、唸、打、化妝及穿戴等不同範疇的內容。《八和頻道：粵劇網上學堂》誠為粵劇入門的最佳指南，是有興趣多認識和了解粵劇人士的不二之選。
  youtubeLink: https://www.youtube.com/channel/UC2ICDbA_GaKY1Y9k9I2q5bg
  categories:
    - cantonese-opera-online-course
    - historic-footages
    - featured-performances
  logo: /images/uploads/resources/channel/barwo-channel-logo.svg
