zh:
  title: 八和會館
  excerpt:
    content: 香港八和會館成立於滿清光緒年間，至今已有一百三十餘年歷史，一直是廣東粵劇從業員的專業組織。會館曾經多次改組，前身分別為八和劇員總公會、八和粵劇協進會、廣東八和粵劇職業工會。
    title: 簡介
  introduction:
    title: 八和會館成立
    content: >-
      一九五三年，在廣東八和粵劇職業工會香港分會的基礎上，重新註冊成立香港八和會館，作為香港粵劇工作者的團體組織。


      香港八和會館以宏揚傳統粵劇藝術，保障同業權益和生活福利為宗旨，並關懷老弱、協助孤寡、祭祀前賢、培育後進。以往五十多年，不單為會員提供福利，更積極參與社會公益事務，每當香港或祖國發生特別事故，香港八和會館總是義不容辭進行籌款演出，例如：「八和愛心獻災民」、「八和送暖到台灣」、「八和愛心獻南亞」及「八和同心暖四川」等。二零零八年十二月十七日，香港八和會館註冊成為慈善團體，致力確立和保護粵劇在香港的生存機制，加固其承傳體系及擴展其傳播層面，使粵劇能夠活態地承傳下去。
    image: /uploads/dsc_4006.jpg
  associations:
    title: 八和會館的屬會及子機構分別有
    buttonTitle: 了解更多
  sections:
    - title: 策略一：搶救及保護粵劇的傳統技藝
      content: |-
        - 鼓勵及加強對粵劇的資料搜集及收集粵劇文物
        - 蒐集粵劇藝人及從業員口述歷史
        - 倡議設立及開放粵劇文獻資料庫
        - 支持粵劇棚戲的演出
        - 修復粵劇獨有的儀式、流程及排場
      image: /images/uploads/about/imag5593.jpg
    - title: 策略二：專業培訓
      content: |-
        - 油麻地戲院場地伙伴計劃「粵劇新秀演出系列」
        - 八和粵劇學院
      image: /images/uploads/about/photo2.jpg
    - title: 策略三：保育及發展粵劇
      content: |-
        - 開班教授劇本編寫課程
        - 籌組粵劇編劇比賽
      image: /images/uploads/about/f16_新書封面_《粵劇編劇基礎教程》_於2012年1月11日正式出版_01.jpg
    - title: 策略四：拓展巿場、觀眾
      content: |-
        - 於小學、中學和大專院校設立「粵劇藝術課程」
        - 舉辦全港性的大型推廣活動
        - 在不同地區舉辦交流演出
      image: /images/uploads/about/plk_180626_chineses-opera_113h.jpg
  excerpt2:
    title: 粵劇藝術
    content: |-
      粵劇是一種揉合唱、做、唸、打、樂師配樂、戲台服飾、抽象形體的表演藝術。

      2009年9月，粵港澳三地政府透過中央政府共同申報的粵劇，獲聯合國教科文組織列入《人類非物質文化遺產代表作名錄》，是香港首項世界非物質文化遺產。
  developmentStrategy: >-
    為了做好粵劇的承傳工作，八和於2009年註冊成為慈善團體，並發表了八和 的「粵劇承傳計劃」。概言之，八和承傳計劃的目標是確立和保護粵劇在香港
    的生存機制，加固其承傳體系及擴展其傳播層面，使粵劇能夠活態地承傳下去


    「粵劇承傳計劃」包括四項主要目標:搶救傳統技藝、專業培訓、拓展巿場 / 觀眾、在傳統上發展粵劇
  developmentStrategyImage: /images/uploads/about/intro-img.jpg
cn:
  introduction:
    image: /uploads/dsc_4006.jpg
    title: 八和会馆成立
    content: >-
      一九五三年，在广东八和粤剧职业工会香港分会的基础上，重新注册成立香港八和会馆，作为香港粤剧工作者的团体组织。


      香港八和会馆以宏扬传统粤剧艺术，保障同业权益和生活福利为宗旨，并关怀老弱、协助孤寡、祭祀前贤、培育后进。以往五十多年，不单为会员提供福利，更积极参与社会公益事务，每当香港或祖国发生特别事故，香港八和会馆总是义不容辞进行筹款演出，例如：「八和爱心献灾民」、「八和送暖到台湾」、「八和爱心献南亚」及「八和同心暖四川」等。二零零八年十二月十七日，香港八和会馆注册成为慈善团体，致力确立和保护粤剧在香港的生存机制，加固其承传体系及扩展其传播层面，使粤剧能够活态地承传下去。
  sections:
    - image: /images/uploads/about/imag5593.jpg
      title: 策略一：抢救及保护粤剧的传统技艺
      content: |-
        - 鼓励及加强对粤剧的资料搜集及收集粤剧文物
        - 搜集粤剧艺人及从业员口述历史
        - 倡议设立及开放粤剧文献资料库
        - 支持粤剧棚戏的演出
        - 修复粤剧独有的仪式、流程及排场
    - image: /images/uploads/about/photo2.jpg
      title: 策略二：专业培训
      content: |-
        - 油麻地戏院场地伙伴计划「粤剧新秀演出系列」
        - 八和粤剧学院
    - image: /images/uploads/about/f16_新書封面_《粵劇編劇基礎教程》_於2012年1月11日正式出版_01.jpg
      title: 策略三：保育及发展粤剧
      content: |-
        - 开班教授剧本编写课程
        - 筹组粤剧编剧比赛
    - image: /images/uploads/about/plk_180626_chineses-opera_113h.jpg
      title: 策略四：拓展巿场、观众
      content: |-
        - 于小学、中学和大专院校设立「粤剧艺术课程」
        - 举办全港性的大型推广活动
        - 在不同地区举办交流演出
  developmentStrategyImage: /images/uploads/about/intro-img.jpg
  title: 八和会馆
  excerpt:
    title: 简介
    content: 香港八和会馆成立于满清光绪年间，至今已有一百三十余年历史，一直是广东粤剧从业员的专业组织。会馆曾经多次改组，前身分别为八和剧员总公会、八和粤剧协进会、广东八和粤剧职业工会。
  associations:
    buttonTitle: 了解更多
    title: 八和会馆的属会及子机构分别有
  excerpt2:
    title: 粤剧艺术
    content: |-
      粤剧是一种揉合唱、做、念、打、乐师配乐、戏台服饰、抽象形体的表演艺术。

      2009年9月，粤港澳三地政府透过中央政府共同申报的粤剧，获联合国教科文组织列入《人类非物质文化遗产代表作名录》，是香港首项世界非物质文化遗产。
  developmentStrategy: >-
    为了做好粤剧的承传工作，八和于2009年注册成为慈善团体，并发表了八和 的「粤剧承传计划」。概言之，八和承传计划的目标是确立和保护粤剧在香港
    的生存机制，加固其承传体系及扩展其传播层面，使粤剧能够活态地承传下去


    「粤剧承传计划」包括四项主要目标:抢救传统技艺、专业培训、拓展巿场 / 观众、在传统上发展粤剧
en:
  introduction:
    title: Establishment of the CAAHK
    content: While developing the art of traditional Cantonese Opera and protecting
      the rights and welfare of fellow performers, CAAHK also aims at providing
      care to the old and weak, assisting the widowed and orphaned, performing
      ceremonies to pay tributes to the Chinese saints and ancestors, and
      nurturing new talents. Over the past 50 years, CAAHK has not only looking
      after the welfare of its members, but also actively participating in
      charity events for the community. Whenever there were huge disasters that
      struck Hong Kong, China of Asia, the CAAHK would immediately organize
      charity performances to raise funds and support those who were affected,
      events such as Love for Victims by CAAHK (八和愛心獻災民), Sending Warmth to
      Taiwan by CAAHK (八和送暖到台灣), Love for South Asia by CAAHK (八和愛心獻南亞), and
      Together CAAHK Warms Up Sichuan (八和同心暖四川) were held. On 17 December 2008,
      the CAAHK was registered as a charity organization. Committed to
      establishing and protecting the survival mechanism of Cantonese Opera in
      Hong Kong, CAAHK aims to strengthen the inheritance system and enhance the
      communication with various stakeholders in the society, thereby passing
      down the tradition of Cantonese Opera in a dynamic fashion.
    image: /uploads/dsc_4006.jpg
  excerpt:
    content: On the basis of the Hong Kong branch of the Guangdong Professional
      Union for Cantonese Opera Performers, the CAAHK was re-registered as a
      professional organization for Cantonese Opera performers Hong Kong in
      1953.
    title: Introduction
  title: CAAHK
  associations:
    title: "The affiliated associations and sub-organizations of the CAAHK include:"
    buttonTitle: Know more
  sections:
    - title: "Strategy 1: Rescuing and Protecting the Traditional Performance Skills
        of Cantonese Opera"
      content: >-
        - Encourage and strengthen the collection of information on Cantonese
        Opera and cultural relics of Cantonese Opera

        - Gather oral history from Cantonese Opera artists and practitioners

        - Propose the establishment and opening of an archive of Cantonese Opera materials

        - Support traditional Cantonese Opera performances on bamboo theatres

        - Repair and restore the ceremonies, rundowns, and arrangements that are unique to Cantonese Opera
      image: /images/uploads/about/imag5593.jpg
    - title: "Strategy 2: Providing Professional Training"
      content: >-
        - Cantonese Opera Young Talent Showcase under Yau Ma Tei Theatre Venue
        Partnership Scheme

        - The Cantonese Opera Academy (COA) of Hong Kong
      image: /images/uploads/about/photo2.jpg
    - title: "Strategy 3: Conserving and Developing of Cantonese Opera"
      content: |-
        - Create classes for Cantonese Opera script-writing skills
        - Organize screenwriting competition for Cantonese Opera 
      image: /images/uploads/about/f16_新書封面_《粵劇編劇基礎教程》_於2012年1月11日正式出版_01.jpg
    - title: "Strategy 4: Expanding the Market and Audience"
      content: >-
        - Organizing Art Courses for Cantonese Opera in primary schools,
        secondary schools and tertiary institutions

        - Organizing territory-wide, large-scale promotional events

        - Hosting performance shows in different districts for idea exchange purpose
      image: /images/uploads/about/plk_180626_chineses-opera_113h.jpg
  excerpt2:
    title: 前瞻
    content: Cantonese Opera is a kind of performing arts that combines singing,
      acting, reciting, acrobatics, music played by musicians, stage costumes,
      and abstract focus. With the joint declaration made by the Governments of
      Guangdong, Hong Kong and Macau in collaboration with the Central
      Government in September 2009, Cantonese Opera was included in the
      "Representative List of the Intangible Cultural Heritage of Humanity" by
      the United Nations Educational, Scientific and Cultural Organization
      (UNESCO) and was also the first world Intangible Cultural Heritage in Hong
      Kong.
  developmentStrategy: >-
    To enhance the inheritance of Cantonese Opera, the CAAHK was registered as a
    charity organization in 2009, followed by the promulgation of the
    Association’s "Cantonese Opera Inheritance Scheme". In summary, the goal of
    CAAHK Cantonese Opera Inheritance Scheme is to establish a mechanism for the
    thriving of Cantonese Opera in Hong Kong, strengthen the inheritance system,
    and enhance the communication with various stakeholders in the society,
    thereby passing down the tradition of Cantonese Opera in a dynamic fashion.


    The establishment of Cantonese Opera Inheritance Scheme includes 4 main goals: rescuing traditional performance skills, providing professional training, expanding the market/audience, and developing Cantonese Opera in the traditional manner.
  developmentStrategyImage: /images/uploads/about/intro-img.jpg
