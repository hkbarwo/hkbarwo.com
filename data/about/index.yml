  excerpt2:
    title: 前瞻
    content: >-
      粵劇是香港的本土文化藝術，保持著優秀傳統的表演文化，通過唱、做、唸、打，配合化妝、服飾、道具和鑼鼓等演繹故事情節，其表演形式糅合了文學、戲劇、曲藝、舞蹈及武打。


      粵劇於2006年列入第一批國家級非遺代表性項目名錄，並於2009年列入聯合國教科文組織《人類非物質文化遺產代表作名錄》。
  developmentStrategy: >-
    為了做好粵劇的承傳工作，八和於2009年註冊成為慈善團體，並發表了八和 的「粵劇承傳計劃」。概言之，八和承傳計劃的目標是確立和保護粵劇在香港
    的生存機制，加固其承傳體系及擴展其傳播層面，使粵劇能夠活態地承傳下去


    「粵劇承傳計劃」包括四項主要目標:搶救傳統技藝、專業培訓、拓展巿場 / 觀眾、在傳統上發展粵劇
  developmentStrategyImage: /images/uploads/about/intro-img.jpg
cn:
  introduction:
    image: /images/uploads/about/intro0-img-2-2.jpg
    title: 八和会馆成立
    content: >-
      一九五三年，在广东八和粤剧职业工会香港分会的基础上，重新注册成立香港八和会馆，作为香港粤剧工作者的团体组织。


      香港八和会馆以宏扬传统粤剧艺术，保障同业权益和生活福利为宗旨，并关怀老弱、协助孤寡、祭祀前贤、培育后进。以往五十多年，不单为会员提供福利，更积极参与社会公益事务，每当香港或祖国发生特别事故，香港八和会馆总是义不容辞进行筹款演出，例如：「八和爱心献灾民」、「八和送暖到台湾」、「八和爱心献南亚」及「八和同心暖四川」等。二零零八年十二月十七日，香港八和会馆注册成为慈善团体，致力确立和保护粤剧在香港的生存机制，加固其承传体系及扩展其传播层面，使粤剧能够活态地承传下去。
  sections:
    - image: /images/uploads/about/imag5593.jpg
      title: 策略一：抢救及保护粤剧的传统技艺
      content: |-
        - 鼓励及加强对粤剧的资料搜集及收集粤剧文物
        - 搜集粤剧艺人及从业员口述历史
        - 倡议设立及开放粤剧文献资料库
        - 支持粤剧棚戏的演出
        - 修复粤剧独有的仪式、流程及排场
    - image: /images/uploads/about/photo2.jpg
      title: 策略二：专业培训
      content: |-
        - 油麻地戏院场地伙伴计划「粤剧新秀演出系列」
        - 八和粤剧学院
    - image: /images/uploads/about/f16_新書封面_《粵劇編劇基礎教程》_於2012年1月11日正式出版_01.jpg
      title: 策略三：保育及发展粤剧
      content: |-
        - 开班教授剧本编写课程
        - 筹组粤剧编剧比赛
    - image: /images/uploads/about/plk_180626_chineses-opera_113h.jpg
      title: 策略四：拓展巿场、观众
      content: |-
        - 于小学、中学和大专院校设立「粤剧艺术课程」
        - 举办全港性的大型推广活动
        - 在不同地区举办交流演出
  developmentStrategyImage: /images/uploads/about/intro-img.jpg
  title: 八和会馆
  excerpt:
    title: 简介
    content: 香港八和会馆成立于满清光绪年间，至今已有一百三十余年历史，一直是广东粤剧从业员的专业组织。会馆曾经多次改组，前身分别为八和剧员总公会、八和粤剧协进会、广东八和粤剧职业工会。
  associations:
    buttonTitle: 了解更多
    title: 八和会馆的属会及子机构分别有
  excerpt2:
    title: 粤剧艺术
    content: |-
      粤剧是一种揉合唱、做、念、打、乐师配乐、戏台服饰、抽象形体的表演艺术。

      2009年9月，粤港澳三地政府透过中央政府共同申报的粤剧，获联合国教科文组织列入《人类非物质文化遗产代表作名录》，是香港首项世界非物质文化遗产。
  developmentStrategy: >-
    为了做好粤剧的承传工作，八和于2009年注册成为慈善团体，并发表了八和 的「粤剧承传计划」。概言之，八和承传计划的目标是确立和保护粤剧在香港
    的生存机制，加固其承传体系及扩展其传播层面，使粤剧能够活态地承传下去


    「粤剧承传计划」包括四项主要目标:抢救传统技艺、专业培训、拓展巿场 / 观众、在传统上发展粤剧
