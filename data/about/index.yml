zh:
  title: 八和會館
  excerpt:
    content: 香港八和會館成立於滿清光緒年間，至今已有一百三十餘年歷史，一直是廣東粵劇從業員的專業組織。會館曾經多次改組，前身分別為八和劇員總公會、八和粵劇協進會、廣東八和粵劇職業工會。
    title: 簡介
  introduction:
    title: 八和會館，創意與傳承
    content: >-
      一九五三年，在廣東八和粵劇職業工會香港分會的基礎上，重新註冊成立香港八和會館，作為香港粵劇工作者的團體組織。


      香港八和會館以宏揚傳統粵劇藝術，保障同業權益和生活福利為宗旨，並關懷老弱、協助孤寡、祭祀前賢、培育後進。以往五十多年，不單為會員提供福利，更積極參與社會公益事務，每當香港或祖國發生特別事故，香港八和會館總是義不容辭進行籌款演出，例如：「八和愛心獻災民」、「八和送暖到台灣」、「八和愛心獻南亞」及「八和同心暖四川」等。於二零零八年十二月十七日，香港八和會館註冊成為非牟利慈善團體。
    image: /images/uploads/about/excerpt.jpg
  associations:
    title: 香港八和會館的屬會分別有
    buttonTitle: 了解更多
  sections:
    - content: 西九文化藝術區已承諾興建一所專為戲曲演出而設計的戲曲中心，將於2015年落成。八和會館正草擬「粵劇發展五年計劃」，除了培訓粵劇演員、樂師、編劇、班政及幕後等各方面的人材，也同步進行培養年青的粵劇觀眾，以傳承及保存本土粵劇文化。演出場地正是粵劇的基本所需，粵劇發展亦因此需要在這方面獲得全面及永久性的支援，爭取一個永久演出的根據基地，將興建的永久粵劇演出場地，必須要具備「具規模」、「交通方便」、「現代化劇場配套」、「具尊嚴形象」、「永久性」和「專為粵劇而建」等六項原則。演出場地需專為粵劇而建，場地設計絕對不能只以西方音樂或歌劇作準，故場地用料、座椅物料及分佈、調音板等設備均需考慮粵劇音樂及鑼鼓的特質。另外設立較大型的女洗手間，升降機，停車場等亦是關顧之列。
      title: 專為戲曲演出 而設計的戲曲中心
      image: /images/uploads/about/excerpt.jpg
    - title: 永久的粵劇表演專用場地
      content: >-
        與此同時，促請政府重新規劃「北角邨」用地，並在北角邨地段興建另一所可供粵劇表演的永久專用場地，以照顧港九兩地龐大的觀眾群。興建表演場地的同時，並一併興建培訓及操練的場地，也可善用土地資源。


        此外八和會館已成功爭取油麻地戲院重新修建成一所粵劇培訓演出場地，繼續爭取油麻地戲院旁的紅磚屋及垃圾站作為辦公、排練及保存資料的場地，均為目標之一。
      image: /images/uploads/about/excerpt.jpg
    - title: 鼓勵大學生及研究生深造粵劇及本土文化學術研究
      content: >-
        香港中文大學音樂系、香港演藝學院及八和會館目前均設立不同類型的粵劇課程，而教育局近年亦積極將粵劇推廣至中小學課程，唯教育界一向缺乏足夠及具一定水平的師資教授粵劇，八和會館計劃進行培養學術人材，並鼓勵大學生及研究生深造粵劇及本土文化學術研究，為發展學術及教育課程提供師資。


        現在，於推廣傳統藝術的基礎上，香港粵劇亦朝「精緻藝術」角度，以照顧喜歡從藝術角度欣賞粵劇的新一群觀眾。今後，粵劇發展方向將會百花齊放。
      image: /images/uploads/about/excerpt.jpg
  excerpt2:
    title: 前瞻
    content: >-
      粵劇是香港的本土文化藝術，保持著優秀傳統的表演文化，通過唱、做、唸、打，配合化妝、服飾、道具和鑼鼓等演繹故事情節，其表演形式糅合了文學、戲劇、曲藝、舞蹈及武打。


      粵劇於2006年列入第一批國家級非遺代表性項目名錄，並於2009年列入聯合國教科文組織《人類非物質文化遺產代表作名錄》。
  developmentStrategy: |-
    # 發展策略

    ## 策略一：搶救及保護粵劇的傳統技藝

    * 加強對粵劇的資料搜集及系統性的研究?
    * 收集粵劇文物
    * 蒐集粵劇藝人及從業員口述歷史
    * 紀錄粵劇不同派別的唱腔及表演方法
    * 對不同時期的藝人作系統性的研究
    * 劇目及劇本的搜集及研究
    * 召開粵劇藝術研討會及會議，鼓勵學者撰寫研究論文
    * 設立及開放粵劇文獻資料庫
    * 支持粵劇棚戲的演出
    * 鼓勵保留粵劇獨有的儀式、流程及排場
    * 專業培訓

    ## 策略二：培訓及提升粵劇藝術的台前幕後各個崗位的藝術人員

    * 成立專業培訓中心或制定專業培訓計劃，有系統地進行粵劇藝人、音樂人員、編劇人員、後台工作人員的專業基礎培訓
    * 為現時的專業演員，提供專業深造話程
    * 倡議增加粵劇排練場地

    ## 策略三：引入現代化的行政管理方法，強化業內的管治及行政

    * 推行公司管治（Corporate Governance）的管治模式鼓勵年輕一輩的粵劇從業員，參與粵劇行政工作
    * 引入不同界別的專業顧問，為粵劇各部門的發展提供意見
    * 提供法律、財務、合約等各方面的專業支援，提升有關組織的行政管理能力

    ## 策略四：增加粵劇從業員的實踐及提升其藝術的機會

    * 增加年輕粵劇藝人的演出機會
    * 增加粵劇從業員與各地戲曲藝術工作者交流的機會
    * 拓展巿場/觀眾

    ## 策略五：擴展粵劇藝術的市場及觀眾

    * 進行有系統的粵劇藝術的市場調查
    * 加強粵劇藝術、文化及節目的宣傳
    * 培訓粵劇藝人及從業員的教授及講解的技巧，以便進行粵劇推廣工作擴展觀眾
    * 提升市民大眾對粵劇的興趣
    * 提升觀眾對粵劇藝術的賞析能力
    * 教育層面的推廣工作
    * 海外觀眾的推廣工作
    * 在傳統上發展發展粵劇

    ## 策略六：在保留傳統粵劇的精髓上，創作新劇本及進行實踐

    * 籌備粵劇編劇課程；提供足夠的條件及資源，讓藝人進行創作
    * 拓展資源讓高質素的劇本創作及創意概念，得以實踐
  developmentStrategyImage: /images/uploads/about/development-strategy-tc.png
