zh:
  title: 八和會館
  excerpt:
    content: 香港八和會館成立於滿清光緒年間，至今已有一百三十餘年歷史，一直是廣東粵劇從業員的專業組織。會館曾經多次改組，前身分別為八和劇員總公會、八和粵劇協進會、廣東八和粵劇職業工會。
    title: 簡介
  introduction:
    title: 八和會館成立
    content: >-
      一九五三年，在廣東八和粵劇職業工會香港分會的基礎上，重新註冊成立香港八和會館，作為香港粵劇工作者的團體組織。


      香港八和會館以宏揚傳統粵劇藝術，保障同業權益和生活福利為宗旨，並關懷老弱、協助孤寡、祭祀前賢、培育後進。以往五十多年，不單為會員提供福利，更積極參與社會公益事務，每當香港或祖國發生特別事故，香港八和會館總是義不容辭進行籌款演出，例如：「八和愛心獻災民」、「八和送暖到台灣」、「八和愛心獻南亞」及「八和同心暖四川」等。二零零八年十二月十七日，香港八和會館註冊成為慈善團體，致力確立和保護粵劇在香港的生存機制，加固其承傳體系及擴展其傳播層面，使粵劇能夠活態地承傳下去。
    image: /images/uploads/about/intro0-img-2-2.jpg
  associations:
    title: 八和會館的屬會及子機構分別有
    buttonTitle: 了解更多
  sections:
    - title: 策略一：搶救及保護粵劇的傳統技藝
      content: |-
        - 鼓勵及加強對粵劇的資料搜集及收集粵劇文物
        - 蒐集粵劇藝人及從業員口述歷史
        - 倡議設立及開放粵劇文獻資料庫
        - 支持粵劇棚戲的演出
        - 修復粵劇獨有的儀式、流程及排場
      image: /images/uploads/about/imag5593.jpg
    - title: 策略二：專業培訓
      content: |-
        - 油麻地戲院場地伙伴計劃「粵劇新秀演出系列」
        - 八和粵劇學院
      image: /images/uploads/about/photo2.jpg
    - title: 策略三：保育及發展粵劇
      content: |-
        - 開班教授劇本編寫課程
        - 籌組粵劇編劇比賽
      image: /images/uploads/about/f16_新書封面_《粵劇編劇基礎教程》_於2012年1月11日正式出版_01.jpg
    - title: 策略四：拓展巿場、觀眾
      content: |-
        - 於小學、中學和大專院校設立「粵劇藝術課程」
        - 舉辦全港性的大型推廣活動
        - 在不同地區舉辦交流演出
      image: /images/uploads/about/plk_180626_chineses-opera_113h.jpg
  excerpt2:
    title: 粵劇藝術
    content: 粵劇是一種揉合唱、做、唸、打、樂師配樂、戲台服飾、抽象形體的表演藝術。2009年9月，粵港澳三地政府透過中央政府共同申報的粵劇，獲聯合國教科文組織列入《人類非物質文化遺產代表作名錄》，是香港首項世界非物質文化遺產。
  developmentStrategy: >-
    為了做好粵劇的承傳工作，八和於2009年註冊成為慈善團體，並發表了八和 的「粵劇承傳計劃」。概言之，八和承傳計劃的目標是確立和保護粵劇在香港
    的生存機制，加固其承傳體系及擴展其傳播層面，使粵劇能夠活態地承傳下去


    「粵劇承傳計劃」包括四項主要目標:搶救傳統技藝、專業培訓、拓展巿場 / 觀眾、在傳統上發展粵劇
  developmentStrategyImage: /images/uploads/about/intro-img.jpg
en:
  introduction:
    title: 八和會館，創意與傳承
    content: >-
      一九五三年，在廣東八和粵劇職業工會香港分會的基礎上，重新註冊成立香港八和會館，作為香港粵劇工作者的團體組織。


      香港八和會館以宏揚傳統粵劇藝術，保障同業權益和生活福利為宗旨，並關懷老弱、協助孤寡、祭祀前賢、培育後進。以往五十多年，不單為會員提供福利，更積極參與社會公益事務，每當香港或祖國發生特別事故，香港八和會館總是義不容辭進行籌款演出，例如：「八和愛心獻災民」、「八和送暖到台灣」、「八和愛心獻南亞」及「八和同心暖四川」等。於二零零八年十二月十七日，香港八和會館註冊成為非牟利慈善團體。
