        widget: string
      - name: "slug"
        label: "Slug"
        widget: string
        pattern: ['^[a-z1-9\-]+$', "必需為英文小寫、數字或「-」組成。例如：「39th」"]
      - name: "period"
        label: "任期"
        i18n: true
        widget: string
      - name: "president"
