      - name: "category"
        label: "分類"
        widget: relation
        collection: "chronicleCategories"
        search_fields: ["title", "slug"]
        value_field: "slug"
        display_fields: ["title"]
      - name: "image"
        label: "圖片"
        widget: image
        media_folder: "/static/images/uploads/about/chronicle"
        public_folder: "/images/uploads/about/chronicle"
        required: false
  - name: "commitiees"
