              - name: "title"
                label: "標題"
                i18n: true
                widget: string
                required: false
              - name: "buttonTitle"
                label: "按扭文字"
                i18n: true
                widget: string
                required: false
          - name: "excerpt2"
            label: "前瞻"
            widget: object
            i18n: true
            collapsed: false
            fields: 
              - name: "title"
                label: "標題"
                i18n: true
                widget: string
                required: false
              - name: "content"
                label: "內文"
                i18n: true
                widget: text
                required: false
          - name: "developmentStrategy"
            label: "發展策略"
            widget: markdown
            i18n: true
          - name: "developmentStrategyImage"
            label: "發展策略圖片"
            widget: image
            media_folder: "/static/images/uploads/about"
            public_folder: "/images/uploads/about"
            required: false
          - name: "sections"
            label: "段落"
            i18n: true
            widget: list
            collapsed: false
            fields:
              - name: "title"
                label: "標題"
                i18n: true
                widget: string
                required: false
              - name: "content"
                label: "內文"
                i18n: true
                widget: text
                required: false
              - name: "image"
                label: "圖片"
                widget: image
                media_folder: "/static/images/uploads/about"
                public_folder: "/images/uploads/about"
                required: false
      - name: "chronicle"
        label: "歷年大事表"
        i18n: true
        file: "/data/about/chronicle.yml"
        fields:
          - name: "excerpt"
            label: "簡介"
            widget: object
            i18n: true
            collapsed: false
            fields: 
              - name: "title"
                label: "標題"
                i18n: true
                widget: string
                required: false
              - name: "content"
                label: "內文"
                i18n: true
                widget: text
                required: false
      - name: "advisors"
        label: "顧問"
        file: "/data/about/organization/advisors.yml"
        i18n: true
        fields:
          - name: "groups"
            label: "組別"
            i18n: true
            widget: list
            fields:
              - name: "title"
                label: "標題"
                i18n: true
                widget: string
              - name: "list"
                label: "名單"
                i18n: true
                widget: list
                fields:
                  - name: "name"
                    label: "名稱"
                    i18n: true
                    widget: string
                  - name: "title"
                    label: "職位"
                    i18n: true
                    widget: string
                    required: false
  - name: "chronicleCategories"
    label: "歷年大事件分類"
    folder: "/data/about/chronicle/categories"
    create: true
    delete: false
    i18n: true
    slug: "{{fields.slug}}"
