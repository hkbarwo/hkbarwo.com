backend:
  name: git-gateway
  repo: caahk/hkbarwo.com
  branch: main
  commit_messages:
    create: 💬 Create {{collection}} “{{slug}}”
    update: 💬 Update {{collection}} “{{slug}}”
    delete: 🔥 Delete {{collection}} “{{slug}}”
    uploadMedia: 🍱 Upload “{{path}}”
    deleteMedia: 🔥 Delete “{{path}}”
    openAuthoring: '🚧 {{message}}'
local_backend: false
publish_mode: editorial_workflow
media_folder: "/static/uploads"
public_folder: "/uploads"
i18n:
  structure: single_file
  locales: [zh, en]
  default_locale: zh
collections:
  - name: "menu"
    label: "選單"
    folder: "/data/menu"
    create: false
    delete: false
    slug: "{{id}}"
    fields:
      - name: "title"
        label: "名稱"
        widget: string
      - name: "id"
        label: "ID"
        widget: string
      - name: "items"
        label: "項目"
        widget: "list"
        summary: "{{fields.item}} [{{fields.style}}]"
        fields:
          - name: "item"
            label: "選單項目"
            widget: relation
            collection: "menuItems"
            search_fields: ["title", "slug"]
            value_field: "slug"
            display_fields: ["title"]
          - name: "style"
            label: "樣式"
            widget: select
            default: "primary"
            options:
              - { label: "首要", value: "primary" }
              - { label: "次要", value: "secondary" }
  - name: "menuItems"
    label: "選單項目"
    folder: "/data/menu/items"
    create: true
    delete: false
    i18n: true
    slug: "{{fields.slug}}"
    sortable_fields: ["title", "slug", "page"]
    fields:
      - name: "title"
        label: "名稱"
        i18n: true
        widget: string
      - name: "slug"
        label: "Slug"
        widget: string
        pattern: ['^[a-z0-9\-]+$', "必需為英文小寫、數字或「-」組成"]
      - name: "url"
        label: "URL"
        widget: string
        required: false
      - name: "page"
        label: "頁面"
        widget: relation
        collection: "pages"
        search_fields: ["title", "slug"]
        value_field: "slug"
        display_fields: ["title"]
      - name: "subPages"
        label: "頁面"
        widget: list
        summary: "{{fields.page}}"
        field:
          name: "page"
          label: "頁面"
          widget: relation
          collection: "pages"
          search_fields: ["title", "slug"]
          value_field: "slug"
          display_fields: ["title"]
  - name: "pages"
    label: "頁面"
    folder: "/data/pages/items"
    create: true
    delete: false
    i18n: true
    slug: "{{fields.slug}}"
    sortable_fields: ["title", "slug", "url"]
    fields:
      - name: "title"
        label: "名稱"
        i18n: true
        widget: string
      - name: "slug"
        label: "Slug"
        widget: string
        pattern: ['^[a-z0-9\-]+$', "必需為英文小寫、數字或「-」組成"]
      - name: "url"
        label: "連結"
        widget: string
      - name: "wip"
        label: "製作中"
        widget: boolean
        default: false
  - name: "home"
    label: "首頁"
    files:
      - name: "swiper"
        label: "幻燈片"
        file: "/data/pages/home/swiper/config.yml"
        fields:
          - name: "slides"
            label: "項目清單"
            widget: list
            summary: "{{fields.slide}}"
            field:
              name: "slide"
              label: "項目"
              widget: relation
              collection: "homeSwiperSlides"
              search_fields: ["title", "shortTitle", "slug"]
              value_field: "slug"
              display_fields: ["title"]
  - name: "homeSwiperSlides"
    label: "首頁幻燈片項目"
    slug: "{{fields.slug}}"
    i18n: true
    create: true
    folder: "/data/pages/home/swiper/slides"
    fields:
      - name: "slug"
        label: "Slug"
        widget: string
        pattern: ['^[a-z0-9\-]+$', "必需為英文小寫、數字或「-」組成"]
      - name: "shortTitle"
        label: "短標題"
        i18n: true
        widget: string
      - name: "title"
        label: "長標題"
        i18n: true
        widget: string
      - name: "subtitle"
        label: "副標題"
        i18n: true
        widget: string
      - name: "description"
        label: "介簡"
        i18n: true
        widget: text
      - name: "buttonTitle"
        label: "按鈕文字"
        i18n: true
        widget: string
      - name: "buttonLink"
        label: "按鈕鏈結"
        widget: object
        fields:
          - name: "url"
            label: "URL"
            widget: string
            required: false
          - name: "page"
            label: "頁面"
            widget: relation
            collection: "pages"
            search_fields: ["title", "slug"]
            value_field: "slug"
            display_fields: ["title"]
            required: false
      - name: "gradient"
        label: "背景漸變"
        widget: object
        fields:
          - name: "color1"
            label: "顏色 1"
            widget: color
          - name: "color2"
            label: "顏色 2"
            widget: color
      - name: "bgImage"
        label: "圖片"
        widget: image
        media_folder: "/static/images/uploads/home/swiper/slides"
        public_folder: "/images/uploads/home/swiper/slides"
        required: false
      - name: "bgImageFillStyle"
        label: "圖片填滿"
        widget: "select"
        default:
          - "cover"
        required: false
        options:
          - label: "全填滿"
            value: "cover"
          - label: "全顯示"
            value: "contain"
  - name: "news"
    label: "最新消息"
    folder: "/data/news/items"
    create: true
    slug: "{{year}}{{month}}{{day}}-{{fields.slug}}"
    i18n: true
    fields:
      - name: "title"
        label: "標題"
        i18n: true
        widget: string
      - name: "slug"
        label: "Slug"
        widget: string
        hint: "適用於網址中"
        pattern: ['^[a-z0-9\-]+$', "必需為英文小寫、數字或「-」組成"]
      - name: "date"
        label: "日期"
        widget: datetime
        date_format: "YYYY-MM-DD"
        time_format: false
        default: ""
      - name: "category"
        label: "分類"
        widget: relation
        collection: "newsCategories"
        search_fields: ["title", "slug"]
        value_field: "slug"
        display_fields: ["title"]
      - name: "content"
        label: "內容"
        i18n: true
        widget: markdown
        required: false
      - name: images
        label: "圖片"
        widget: image
        required: false
        media_library:
          config:
            multiple: true
        media_folder: "/static/images/uploads/news"
        public_folder: "/images/uploads/news"
      - name: "pdfFile"
        label: "PDF 檔案"
        i18n: true
        widget: file
        required: false
      - name: "youtubeVideoID"
        label: "YouTube 影片 ID"
        widget: string
        required: false
  - name: "newsCategories"
    label: "最新消息分類"
    folder: "/data/news/categories"
    create: true
    delete: false
    i18n: true
    slug: "{{fields.slug}}"
    sortable_fields: ["title", "slug"]
    fields:
      - name: "title"
        label: "名稱"
        i18n: true
        widget: string
      - name: "slug"
        label: "Slug"
        widget: string
        pattern: ['^[a-z0-9\-]+$', "必需為英文小寫、數字或「-」組成"]
      - name: "color"
        label: "顏色"
        widget: color
  - name: "newsCategoriesOrder"
    label: "最新消息分類排序"
    files:
      - name: "list"
        label: "列表"
        file: "/data/news/categories/order.yml"
        fields:
          - name: "item"
            label: "項目"
            widget: list
            field:
              name: "category"
              label: "分類"
              widget: relation
              collection: "newsCategories"
              search_fields: ["title", "slug"]
              value_field: "slug"
              display_fields: ["title"]
  - name: "about"
    label: "📄 關於我們頁面"
    i18n: true
    files:
      - name: "index"
        label: "八和會館"
        i18n: true
        file: "/data/about/index.yml"
        fields:
          - name: "title"
            label: "標題"
            i18n: true
            widget: string
            required: false
          - name: "excerpt"
            label: "簡介"
            widget: object
            i18n: true
            collapsed: false
            fields: 
              - name: "title"
                label: "標題"
                i18n: true
                widget: string
                required: false
              - name: "content"
                label: "內文"
                i18n: true
                widget: text
                required: false
          - name: "introduction"
            label: "介紹"
            widget: object
            i18n: true
            collapsed: false
            fields: 
              - name: "title"
                label: "標題"
                i18n: true
                widget: string
                required: false
              - name: "content"
                label: "內文"
                i18n: true
                widget: text
                required: false
              - name: "image"
                label: "圖片"
                i18n: duplicate
                widget: image
                media_folder: "/static/images/uploads/about"
                public_folder: "/images/uploads/about"
                required: false
          - name: "associations"
            label: "屬會"
            i18n: true
            widget: object
            collapsed: false
            fields: 
              - name: "title"
                label: "標題"
                i18n: true
                widget: string
                required: false
              - name: "buttonTitle"
                label: "按扭文字"
                i18n: true
                widget: string
                required: false
          - name: "excerpt2"
            label: "前瞻"
            widget: object
            i18n: true
            collapsed: false
            fields: 
              - name: "title"
                label: "標題"
                i18n: true
                widget: string
                required: false
              - name: "content"
                label: "內文"
                i18n: true
                widget: text
                required: false
          - name: "developmentStrategy"
            label: "發展策略"
            widget: markdown
            i18n: true
          - name: "developmentStrategyImage"
            label: "發展策略圖片"
            widget: image
            i18n: true
            media_folder: "/static/images/uploads/about"
            public_folder: "/images/uploads/about"
            required: false
          - name: "sections"
            label: "段落"
            i18n: true
            widget: list
            collapsed: false
            fields:
              - name: "title"
                label: "標題"
                i18n: true
                widget: string
                required: false
              - name: "content"
                label: "內文"
                i18n: true
                widget: text
                required: false
              - name: "image"
                label: "圖片"
                widget: image
                media_folder: "/static/images/uploads/about"
                public_folder: "/images/uploads/about"
                required: false
      - name: "chronicle"
        label: "歷年大事表"
        i18n: true
        file: "/data/about/chronicle.yml"
        fields:
          - name: "excerpt"
            label: "簡介"
            widget: object
            i18n: true
            collapsed: false
            fields: 
              - name: "title"
                label: "標題"
                i18n: true
                widget: string
                required: false
              - name: "content"
                label: "內文"
                i18n: true
                widget: text
                required: false
          - name: "pdf"
            label: "PDF 檔案"
            i18n: true
            widget: file
            required: false
      - name: "advisors"
        label: "📄 贊助人及顧問頁面"
        file: "/data/about/organization/advisors.yml"
        i18n: true
        fields:
          - name: "title"
            label: "標題"
            i18n: true
            widget: string
          - name: "groups"
            label: "組別"
            i18n: true
            widget: list
            fields:
              - name: "title"
                label: "標題"
                i18n: true
                widget: string
              - name: "list"
                label: "名單"
                i18n: true
                widget: list
                fields:
                  - name: "name"
                    label: "名稱"
                    i18n: true
                    widget: string
                  - name: "title"
                    label: "職位"
                    i18n: true
                    widget: string
                    required: false
      - name: "associations"
        label: "📄 屬會、子機構頁面"
        file: "/data/about/associations.yml"
        fields:
          - name: "order"
            label: "🔀 排序"
            widget: list
            summary: "{{fields.association}}"
            field:
              name: "association"
              label: "📄 屬會、子機構"
              widget: relation
              collection: "associations"
              search_fields: ["title", "slug"]
              value_field: "slug"
              display_fields: ["title"]
  - name: "chronicleCategories"
    label: "歷年大事件分類"
    folder: "/data/about/chronicle/categories"
    create: true
    delete: false
    i18n: true
    slug: "{{fields.slug}}"
    sortable_fields: ["title", "slug"]
    fields:
      - name: "title"
        label: "名稱"
        i18n: true
        widget: string
      - name: "slug"
        label: "Slug"
        widget: string
        pattern: ['^[a-z0-9\-]+$', "必需為英文小寫、數字或「-」組成"]
      - name: "color"
        label: "顏色"
        widget: color
  - name: "chronicleItems"
    label: "歷年大事件項目"
    folder: "/data/about/chronicle/items"
    create: true
    i18n: true
    slug: "{{year}}{{month}}{{day}}-{{fields.slug}}"
    sortable_fields: ["title", "slug", "date"]
    fields:
      - name: "title"
        label: "內容"
        i18n: true
        widget: string
      - name: "slug"
        label: "Slug"
        widget: string
        pattern: ['^[a-z0-9\-]+$', "必需為英文小寫、數字或「-」組成"]
      - name: "date"
        label: "日期"
        widget: datetime
        default: ""
        date_format: "YYYY-MM-DD"
        time_format: false
      - name: "category"
        label: "分類"
        widget: relation
        collection: "chronicleCategories"
        search_fields: ["title", "slug"]
        value_field: "slug"
        display_fields: ["title"]
      - name: "image"
        label: "圖片"
        widget: image
        media_folder: "/static/images/uploads/about/chronicle"
        public_folder: "/images/uploads/about/chronicle"
        required: false
        default: ""
  - name: "commitiees"
    label: "理事會"
    folder: "/data/about/organization/commitiees"
    create: true
    i18n: true
    slug: "{{fields.slug}}"
    fields:
      - name: "title"
        label: "標題"
        i18n: true
        widget: string
      - name: "slug"
        label: "Slug"
        widget: string
        pattern: ['^[a-z0-9\-]+$', "必需為英文小寫、數字或「-」組成。例如：「39th」"]
      - name: "period"
        label: "任期"
        i18n: true
        widget: string
      - name: "president"
        label: "主席"
        i18n: true
        widget: object
        fields:
          - name: "name"
            label: "名稱"
            i18n: true
            widget: string
          - name: "image"
            label: "相片"
            widget: image
            media_folder: "/static/images/uploads/organization/commitiees"
            public_folder: "/images/uploads/organization/commitiees"
            required: false
      - name: "vicePresidents"
        label: "副主席"
        i18n: true
        widget: list
        fields:
          - name: "name"
            label: "名稱"
            i18n: true
            widget: string
          - name: "image"
            label: "相片"
            widget: image
            media_folder: "/static/images/uploads/organization/commitiees"
            public_folder: "/images/uploads/organization/commitiees"
            required: false
      - name: "groups"
        label: "組"
        i18n: true
        widget: list
        fields:
          - name: "title"
            label: "名稱"
            widget: string
            required: false
          - name: "commitiees"
            label: "理事"
            i18n: true
            widget: list
            default: "[]"
            fields:
              - name: "name"
                label: "名稱"
                i18n: true
                widget: string
              - name: "title"
                label: "職位"
                i18n: true
                widget: string
              - name: "image"
                label: "相片"
                widget: image
                media_folder: "/static/images/uploads/organization/commitiees"
                public_folder: "/images/uploads/organization/commitiees"
                required: false
  - name: "commitieePresidents"
    label: "理事會會長"
    i18n: true
    files:
      - name: "presidents"
        label: "會長"
        file: "/data/about/organization/commitiees/presidents.yml"
        i18n: true
        fields:
          - name: "list"
            label: "會長"
            i18n: true
            widget: list
            fields:
              - name: "name"
                label: "名稱"
                i18n: true
                widget: string
              - name: "title"
                label: "職位"
                i18n: true
                widget: string
              - name: "image"
                label: "相片"
                widget: image
                media_folder: "/static/images/uploads/organization/commitiees"
                public_folder: "/images/uploads/organization/commitiees"
                required: false
      - name: "vicePresidents"
        label: "副會長"
        i18n: true
        file: "/data/about/organization/commitiees/vice-presidents.yml"
        fields:
          - name: "list"
            label: "副會長"
            i18n: true
            widget: list
            fields:
              - name: "name"
                label: "名稱"
                i18n: true
                widget: string
              - name: "title"
                label: "職位"
                i18n: true
                widget: string
              - name: "image"
                label: "相片"
                widget: image
                media_folder: "/static/images/uploads/organization/commitiees"
                public_folder: "/images/uploads/organization/commitiees"
                required: false
  - name: "associations"
    label: "屬會"
    i18n: true
    create: true
    delete: false
    folder: "/data/about/associations"
    slug: "{{fields.slug}}"
    fields:
      - name: "title"
        label: "名稱"
        i18n: true
        widget: string
      - name: "shortTitle"
        label: "簡短名稱"
        i18n: true
        widget: string
      - name: "slug"
        label: "Slug"
        widget: string
        pattern: ['^[a-z0-9\-]+$', "必需為英文小寫、數字或「-」組成。"]
      - name: "logo"
        label: "圖示"
        widget: image
        media_folder: "/static/images/uploads/associations"
        public_folder: "/images/uploads/associations"
        required: false
        default: ""
      - name: "logoWhite"
        label: "圖示（反白）"
        widget: image
        media_folder: "/static/images/uploads/associations"
        public_folder: "/images/uploads/associations"
        required: false
        default: ""
      - name: "description"
        label: "介紹"
        i18n: true
        widget: markdown
        required: false
        default: ""
      - name: "commitieesTitle"
        label: "名單標題"
        i18n: true
        widget: string
        required: false
        default: ""
      - name: "commitiees"
        label: "名單"
        i18n: true
        widget: list
        required: false
        default: "[]"
        fields:
          - name: "name"
            label: "名稱"
            i18n: true
            widget: string
          - name: "title"
            label: "職位"
            i18n: true
            widget: string
            required: false
            default: ""
  - name: "interviewCategories"
    label: "訪問分類"
    folder: "/data/about/interviews/categories"
    create: true
    delete: false
    i18n: true
    slug: "{{fields.slug}}"
    sortable_fields: ["title", "slug"]
    fields:
      - name: "title"
        label: "名稱"
        i18n: true
        widget: string
      - name: "slug"
        label: "Slug"
        widget: string
        pattern: ['^[a-z0-9\-]+$', "必需為英文小寫、數字或「-」組成"]
  - name: "interviewItems"
    label: "訪問項目"
    folder: "/data/about/interviews/items"
    create: true
    i18n: true
    slug: "{{year}}{{month}}{{day}}-{{fields.slug}}"
    sortable_fields: ["title", "slug", "date"]
    fields:
      - name: "title"
        label: "標題"
        i18n: true
        widget: string
      - name: "slug"
        label: "Slug"
        widget: string
        pattern: ['^[a-z0-9\-]+$', "必需為英文小寫、數字或「-」組成"]
      - name: "date"
        label: "日期"
        widget: datetime
        default: ""
        date_format: "YYYY-MM-DD"
        time_format: false
      - name: "category"
        label: "分類"
        widget: relation
        collection: "interviewCategories"
        search_fields: ["title", "slug"]
        value_field: "slug"
        display_fields: ["title"]
      - name: "biographic"
        label: "人物簡介"
        widget: object
        i18n: true
        fields:
          - name: "title"
            label: "標題"
            i18n: true
            widget: string
          - name: "description"
            label: "內容"
            i18n: true
            widget: text
          - name: "image"
            label: "相片"
            widget: image
            media_folder: "/static/images/uploads/about/interviews"
            public_folder: "/images/uploads/about/interviews"
            required: false
      - name: "body"
        label: "內文"
        i18n: true
        widget: markdown
  - name: "contact"
    label: "📄 聯絡我們頁面"
    i18n: true
    files:
      - name: "info"
        label: "聯絡資料"
        i18n: true
        file: "/data/pages/contact/info.yml"
        fields:
          - name: "title"
            label: "標題"
            i18n: true
            widget: string
          - name: "subtitle"
            label: "副標題"
            i18n: true
            widget: string
            required: false
            default: ""
          - name: "phone"
            label: "電話"
            widget: string
          - name: "fax"
            label: "傳真"
            widget: string
          - name: "email"
            label: "電郵"
            widget: string
          - name: "address"
            label: "地址"
            i18n: true
            widget: string
  - name: "resourcesPage"
    label: "資源中心頁面"
