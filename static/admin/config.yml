              - name: "title"
                label: "標題"
                i18n: true
                widget: string
                required: false
              - name: "content"
                label: "內文"
                i18n: true
                widget: text
                required: false
          - name: "introduction"
            label: "介紹"
            widget: object
            i18n: true
            collapsed: false
            fields: 
              - name: "title"
                label: "標題"
                i18n: true
                widget: string
                required: false
              - name: "content"
                label: "內文"
                i18n: true
                widget: text
                required: false
              - name: "image"
                label: "圖片"
